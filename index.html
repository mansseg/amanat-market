        .filter-btn.active, .filter-btn:hover { background: var(--gold); color: var(--green-dark); border-color: var(--gold); }
        
        /* Поиск */

        .search-box input { width: 100%; padding: 0.7rem 1rem 0.7rem 2.5rem; border: 2px solid var(--border); border-radius: 50px; }
        .search-box i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--gold); }

        /* Сетка товаров и фикс картинок */

        .product-card { background: #fff; border-radius: 1.25rem; overflow: hidden; box-shadow: 0 5px 20px var(--shadow); border: 2px solid var(--border); transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 15px 40px var(--gold-shadow); }
        
        .product-image-wrapper { height: 200px; background: #fff; display: flex; align-items: center; justify-content: center; padding: 15px; position: relative; }
        .product-image { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* Заглушка, если картинка сломается, чтобы карточка не пустовала */
        .product-image-wrapper::before { content: '📦'; position: absolute; font-size: 3rem; opacity: 0.1; z-index: 1; }
        .product-image { position: relative; z-index: 2; }

        .product-info { padding: 1.2rem; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
        .product-brand { color: var(--gold-dark); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.25rem; }
        .product-name { font-size: 1.1rem; font-weight: 700; color: var(--green-dark); font-family: 'Cormorant Garamond', serif; min-height: 44px; margin-bottom: 0.5rem; }
        .product-price { font-size: 1.5rem; font-weight: 800; color: var(--green-dark); margin-bottom: 1rem; }

        ];

        let cart = {};
        let currentCategory = 'all';
        let searchQuery = '';

        // Инициализация рендера товаров
        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            
            const filtered = products.filter(p => {
                const matchesCat = currentCategory === 'all' || p.cat === currentCategory;
                const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.brand.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCat && matchesSearch;
            });

            filtered.forEach(p => {
                const qty = cart[p.id] || 0;
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-image-wrapper">
                        <img src="${p.img}" alt="${p.name}" class="product-image" onerror="this.style.opacity='0'">
                    </div>
                    <div class="product-info">
                        <div>
                            <div class="product-brand">${p.brand}</div>
                            <div class="product-name">${p.name}</div>
                        </div>
                        <div>
                            <div class="product-price">${p.price} ₽</div>
                            <div class="quantity-selector">
                                <button class="qty-btn" onclick="updateQty(${p.id}, -1)">-</button>
                                <span class="qty-value">${qty}</span>
                                <button class="qty-btn" onclick="updateQty(${p.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateQty(id, change) {
            if (!cart[id]) cart[id] = 0;
            cart[id] += change;
            if (cart[id] <= 0) delete cart[id];
            
            updateCartUI();
            renderProducts();
        }

        function updateCartUI() {
            let totalCount = 0;
            let totalPrice = 0;
            
            for (let id in cart) {
                const prod = products.find(p => p.id == id);
                if (prod) {
                    totalCount += cart[id];
                    totalPrice += prod.price * cart[id];
                }
            }

            document.getElementById('cart-count').innerText = `${totalCount} шт.`;
            document.getElementById('cart-total-nav').innerText = `${totalPrice} ₽`;
            document.getElementById('modal-total-amount').innerText = `${totalPrice} ₽`;
            
            // Настройка ссылки WhatsApp
            let message = `Здравствуйте! Мой заказ в Аманат Маркет:\n\n`;
            for (let id in cart) {
                const prod = products.find(p => p.id == id);
                message += `• ${prod.name} (${cart[id]} шт.) — ${prod.price * cart[id]} ₽\n`;
            }
            message += `\nИтого: ${totalPrice} ₽`;
            
            // Замени 79999999999 на реальный номер менеджера
            document.getElementById('whatsapp-send-btn').href = `https://wa.me/79999999999?text=${encodeURIComponent(message)}`;
        }

        function filterCategory(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts();
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value;
            renderProducts();
        }

        function toggleModal(show) {
            const modal = document.getElementById('cart-modal');
            const list = document.getElementById('modal-cart-items');
            list.innerHTML = '';

            if (show) {
                modal.classList.add('active');
                for (let id in cart) {
                    const prod = products.find(p => p.id == id);
                    const itemRow = document.createElement('div');
                    itemRow.className = 'cart-item';
                    itemRow.innerHTML = `
                        <div><strong>${prod.name}</strong></div>
                        <div>${cart[id]} шт. x ${prod.price} ₽ = ${prod.price * cart[id]} ₽</div>
                    `;
                    list.appendChild(itemRow);
                }
            } else {
                modal.classList.remove('active');
            }
        }

        // Первичный запуск
        renderProducts();
    </script>
